apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: home-network-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.68.200-192.168.68.240
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: home-network-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - home-network-pool