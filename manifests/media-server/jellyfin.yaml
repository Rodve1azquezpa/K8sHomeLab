apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Ensures this only runs on our Dell Tower VMs, not the Pi (yet)
      nodeSelector:
        kubernetes.io/arch: amd64 
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        ports:
        - containerPort: 8096
        volumeMounts:
        - name: nas-storage
          mountPath: /config
          subPath: jellyfin-config  # Creates a specific folder on the USB drive
        - name: nas-storage
          mountPath: /media
          subPath: jellyfin-media   # Creates a specific folder on the USB drive
      volumes:
      - name: nas-storage
        persistentVolumeClaim:
          claimName: pvc-media      # Links back to our 2TB USB drive!
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-svc
spec:
  type: LoadBalancer
  ports:
  - port: 8096
    targetPort: 8096
  selector:
    app: jellyfin
